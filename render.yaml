services:
  - type: web
    name: nhl-trend-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    envVars:
      - key: DB_PATH
        value: /tmp/polymarket.db
      - key: POLL_INTERVAL
        value: 60
      - key: TREND_THRESHOLD
        value: 0.02
